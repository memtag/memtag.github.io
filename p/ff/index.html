<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Fast Page</title><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}img{width:100vw;height:100vh;object-fit:contain;transition:transform .25s ease-out;pointer-events:none}.active{transform:scale(0.95)}</style></head><body onclick="p()"><img id="i" src="img.jpg"><audio id="s" src="snd.mp3" preload="auto"></audio><script>const a=document.getElementById("s"),m=document.getElementById("i");function p(){a.currentTime=0;a.play();m.classList.add("active");setTimeout(()=>m.classList.remove("active"),250)}</script></body></html>
