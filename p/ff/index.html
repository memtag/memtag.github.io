<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Fast Page</title><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;cursor:pointer}img{max-width:100%;max-height:100%;transition:transform .25s ease-out;user-select:none;-webkit-tap-highlight-color:transparent}.active{transform:scale(0.8)}</style></head><body onclick="play()"><img id="p" src="img.jpg" alt="Click me"><audio id="s" src="snd.mp3" preload="auto"></audio><script>const a=document.getElementById("s"),i=document.getElementById("p");function play(){a.currentTime=0;a.play();i.classList.add("active");setTimeout(()=>i.classList.remove("active"),250)}</script></body></html>
